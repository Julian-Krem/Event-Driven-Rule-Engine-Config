server.port=8081

# Test property — change this value and POST /actuator/busrefresh to verify live config refresh
test.message=test 1, 2, 3, 4, 5

# RabbitMQ — Spring Cloud Bus (config refresh propagation)
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST}

# PostgreSQL
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USERNAME}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/app-changelog.xml

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_HOST}:${KAFKA_PORT}

spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP_ID:rule-engine-group}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

app.kafka.input-topic=${KAFKA_INPUT_TOPIC:input-events}
app.kafka.output-topic=${KAFKA_OUTPUT_TOPIC:output-events}
app.kafka.dead-letter-topic=${KAFKA_DEAD_LETTER_TOPIC:dead-letter-events}

# Rule Engine — URLs to JSON config files (change these and POST /actuator/busrefresh to hot-reload rules)
app.rules.conditions-path=https://raw.githubusercontent.com/Julian-Krem/Event-Driven-Rule-Engine-Config/main/Json-Configurations/Config-Currently-In-Use/conditions.json
app.rules.transformations-path=https://raw.githubusercontent.com/Julian-Krem/Event-Driven-Rule-Engine-Config/main/Json-Configurations/Config-Currently-In-Use/transformations.json

# Actuator — expose refresh + busrefresh endpoints for Spring Cloud Bus
management.endpoints.web.exposure.include=health,info,refresh,busrefresh
